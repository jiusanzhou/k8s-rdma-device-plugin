apiVersion: v1
kind: Pod
metadata:
  name: rdma-test-pod
  annotations:
    # Optional: inject specific devices via annotation
    # devices.nri.io/pod: |
    #   - path: /dev/infiniband/uverbs0
    #     type: c
    #     major: 231
    #     minor: 0
spec:
  containers:
    - name: rdma-test
      image: ubuntu:22.04
      command: ["sleep", "infinity"]
      resources:
        limits:
          rdma.io/hca: "1"
---
# GPU + RDMA test pod (auto-injects RDMA devices matching GPU PCIe topology)
apiVersion: v1
kind: Pod
metadata:
  name: gpu-rdma-test-pod
spec:
  containers:
    - name: gpu-rdma-test
      image: nvidia/cuda:12.0-base
      command: ["sleep", "infinity"]
      env:
        - name: NVIDIA_VISIBLE_DEVICES
          value: "0,1"
      resources:
        limits:
          nvidia.com/gpu: "2"
          rdma.io/hca: "1"
